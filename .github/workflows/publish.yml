name: Publish @leesuyeon/ssr-devtools

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        # See ci.yml for rationale (npm/cli#4828 workaround).
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./packages/server/package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${tag_version}) does not match packages/server/package.json version ${pkg_version}"
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches package version ${pkg_version}"

      - name: Build server package
        run: npm run build --workspace=packages/server

      - name: Publish to npm
        run: npm publish --workspace=packages/server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
