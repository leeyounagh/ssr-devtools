name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Workaround for npm/cli#4828: workspaces + optionalDependencies
        # bug leaves platform native binaries (rollup, esbuild) un-
        # installed even with the matching entry present in the lockfile.
        # The official guidance from the rollup error is to remove both
        # node_modules AND package-lock.json before re-installing.
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Build server package
        run: npm run build --workspace=packages/server

      - name: Build extension icons
        run: npm run build:icons --workspace=packages/extension

      - name: Build extension zip
        run: npm run build:zip --workspace=packages/extension
