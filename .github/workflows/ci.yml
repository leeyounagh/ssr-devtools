name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server package
        run: npm run build --workspace=packages/server

      - name: Build extension icons
        run: npm run build:icons --workspace=packages/extension

      - name: Build extension zip
        run: npm run build:zip --workspace=packages/extension
