name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Workaround for npm/cli#4828: workspace + optionalDependencies bug
        # leaves platform-specific native binaries (rollup, esbuild) unin-
        # stalled. Wiping node_modules and using `npm install` reliably
        # resolves the matching binary for the current platform.
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund

      - name: Build server package
        run: npm run build --workspace=packages/server

      - name: Build extension icons
        run: npm run build:icons --workspace=packages/extension

      - name: Build extension zip
        run: npm run build:zip --workspace=packages/extension
